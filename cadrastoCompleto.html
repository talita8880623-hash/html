<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Simples</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 20px auto; padding: 0 10px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input[type="text"], input[type="email"], input[type="password"], 
        input[type="date"], input[type="number"], input[type="tel"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .linha { display: flex; gap: 10px; margin-top: 5px; }
        .botoes { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Cadastro</h2>
    <form action="#" method="POST">
        
        <div class="campo">
            <label for="nome">Nome Completo:*</label>
            <input type="text" id="nome" name="nome" required minlength="3">
        </div>

        <div class="campo">
            <label for="email">E-mail:*</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
            <label for="senha">Senha:*</label>
            <input type="password" id="senha" name="senha" required minlength="6">
        </div>

        <div class="campo">
            <label for="nascimento">Data de Nascimento:*</label>
            <input type="date" id="nascimento" name="nascimento" required>
        </div>

        <div class="campo">
            <label for="idade">Idade:*</label>
            <input type="number" id="idade" name="idade" required min="1" max="120">
        </div>

        <div class="campo">
            <label for="telefone">Telefone:*</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="DDD + Número">
        </div>

        <div class="campo">
            <label>Gênero:*</label>
            <div class="linha">
                <label><input type="radio" name="genero" value="M" required> M</label>
                <label><input type="radio" name="genero" value="F"> F</label>
                <label><input type="radio" name="genero" value="Outro"> Outro</label>
            </div>
        </div>

        <div class="campo">
            <label>Interesses:</label>
            <div class="linha">
                <label><input type="checkbox" name="interesses[]" value="tec"> Tec</label>
                <label><input type="checkbox" name="interesses[]" value="esporte"> Esporte</label>
                <label><input type="checkbox" name="interesses[]" value="musica"> Música</label>
            </div>
        </div>

        <div class="campo">
            <label for="cidade">Cidade:*</label>
            <select id="cidade" name="cidade" required>
                <option value="">Selecione...</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Timoteos</option>
                <option value="BH">Belo Horizonte</option>
            </select>
        </div>

        <div class="campo">
            <label for="comentarios">Comentários:</label>
            <textarea id="comentarios" name="comentarios" rows="3"></textarea>
        </div>

        <div class="botoes">
            <button type="reset" style="background:#ccc; border:1px solid #aaa;">Limpar</button>
            <button type="submit" style="background:#28a745; color:white; border:none; border-radius:4px;">Enviar</button>
        </div>

    </form>

</body>
</html>
